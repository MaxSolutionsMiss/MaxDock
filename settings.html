<main class="screen pageWrap">
  <div class="pageHead">
    <div><h2>Settings</h2><p>Manage dock names, operating hours, and appointment timing.</p></div>
    <div class="toolbar"><button class="greenBtn" onclick="saveSettings()">Save Settings</button><button class="secondaryBtn" onclick="resetSettings()">Reset Defaults</button></div>
  </div>
  <div class="settingsGrid">
    <section class="settingsGroup">
      <h3>Operating Hours</h3>
      <div class="formGrid">
        <div class="field"><label>Open Time</label><input type="time" id="setOpen"></div>
        <div class="field"><label>Close Time</label><input type="time" id="setClose"></div>
        <div class="field"><label>Slot Increment</label><select id="setInterval"><option>15</option><option>30</option></select></div>
        <div class="field"><label>Buffer Minutes</label><input type="number" id="setBuffer"></div>
      </div>
    </section>
    <section class="settingsGroup">
      <h3>Dock Doors</h3>
      <div class="docksList" id="docksList"></div>
      <button class="secondaryBtn" style="margin-top:10px" onclick="addDock()">Add Dock</button>
    </section>
    <section class="settingsGroup">
      <h3>Timing Rules</h3>
      <div class="formGrid">
        <div class="field"><label>Base Minutes</label><input type="number" id="setBase"></div>
        <div class="field"><label>Minutes per Skid</label><input type="number" id="setPerSkid"></div>
        <div class="field"><label>Full Truck Minimum</label><input type="number" id="setFullTruck"></div>
        <div class="field"><label>Priority Minimum</label><input type="number" id="setPriorityMin"></div>
      </div>
    </section>
  </div>
</main>
