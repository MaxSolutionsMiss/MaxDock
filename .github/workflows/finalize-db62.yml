name: Finalize DB62 review

on:
  push:
    branches:
      - codex/db62-spacing-queue-seven-kpis-refresh

permissions:
  contents: write

jobs:
  finalize:
    if: ${{ github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[db62-finalized]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/db62-spacing-queue-seven-kpis-refresh
          fetch-depth: 0

      - name: Apply DB62 files
        shell: bash
        run: |
          echo '' | base64 -d | gzip -d > /tmp/apply-db62.py
          python /tmp/apply-db62.py

      - name: Validate DB62
        shell: bash
        run: |
          set -euo pipefail
          cmp maxdock-config.js db04/maxdock-config.js
          cmp maxdock-ops-density.js db04/maxdock-ops-density.js
          cmp maxdock-db62.css db04/maxdock-db62.css
          cmp maxdock-db62.js db04/maxdock-db62.js
          cmp DEPLOYMENT_DB62.txt db04/DEPLOYMENT_DB62.txt
          grep -q 'MaxDock-v83-DB62' maxdock-config.js
          grep -q 'minimumInterval=180000' maxdock-config.js
          grep -q 'maxdock-db62.css' maxdock-config.js
          grep -q 'maxdock-db62.js' maxdock-config.js
          grep -q 'maxdockRelease="db62"' maxdock-config.js
          grep -q 'const DASHBOARD_MAX=7;' maxdock-ops-density.js
          grep -q 'margin:0 0 0 auto!important' maxdock-db62.css
          grep -q 'db62QueueInlineField' maxdock-db62.css
          grep -q -- '--db62-dashboard-columns' maxdock-db62.css
          grep -q 'watchRefreshLanguage' maxdock-db62.js
          node --check maxdock-config.js
          node --check maxdock-ops-density.js
          node --check maxdock-db62.js

      - name: Finalize review commit
        shell: bash
        run: |
          rm -f .github/workflows/finalize-db62.yml
          git config user.name "MaxSolutionsMiss"
          git config user.email "javadresa@maxpkgsolutions.com"
          git add -A
          git commit -m "[db62-finalized] Tighten controls, enable seven KPIs, and calm refresh"
          git push origin codex/db62-spacing-queue-seven-kpis-refresh
