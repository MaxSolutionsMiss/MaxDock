name: DB73 attach final controls
on:
  push:
    paths:
      - '.github/workflows/db73-attach-final.yml'
permissions:
  contents: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0
      - name: Attach final DB73 assets
        run: |
          python - <<'PY'
          from pathlib import Path
          for name in ['dashboard.html','queue.html','reports.html','settings.html']:
              p=Path('db04')/name
              s=p.read_text()
              s=s.replace('<link rel="stylesheet" href="./maxdock-db73-final.css?v=104-db73">','')
              s=s.replace('<script src="./maxdock-db73-final.js?v=104-db73"></script>','')
              s=s.replace('</head>','  <link rel="stylesheet" href="./maxdock-db73-final.css?v=104-db73">\n</head>')
              s=s.replace('</body>','<script src="./maxdock-db73-final.js?v=104-db73"></script>\n</body>')
              if name=='settings.html':
                  s=s.replace('    <div class="toolbar compactPageActions"><button class="greenBtn" onclick="saveSettings()">Save settings</button><button class="secondaryBtn" onclick="resetSettings()">Reset defaults</button></div>\n','')
              p.write_text(s)
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add db04/dashboard.html db04/queue.html db04/reports.html db04/settings.html
          git commit -m 'DB73 attach unified controls and remove top settings actions'
          git push origin gh-pages
