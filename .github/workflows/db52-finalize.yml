name: Finalize DB52 booking flow

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'codex/db52-booking-flow-placement-simplification'
    runs-on: ubuntu-latest
    steps:
      - name: Check out DB52 branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply DB52 release patch
        run: python scripts/db52_finalize_patch.py

      - name: Validate DB52 release
        shell: bash
        run: |
          grep -q 'MaxDock-v73-DB52' maxdock-config.js
          grep -q 'maxdock-db52.css' maxdock-config.js
          grep -q 'maxdock-db52.js' maxdock-config.js
          grep -q 'bookAppointmentFromMyAppointments' my-appointments.html
          grep -q 'Book Appointment' dashboard.html
          grep -q 'Choose a Time' index.html
          grep -q 'id="refreshQueue" type="button">Refresh</button>' queue.html
          test -f maxdock-db52.css
          test -f maxdock-db52.js
          node --check maxdock-config.js
          node --check maxdock-db52.js
          cmp -s maxdock-config.js db04/maxdock-config.js
          cmp -s maxdock-db52.css db04/maxdock-db52.css
          cmp -s maxdock-db52.js db04/maxdock-db52.js
          cmp -s my-appointments.html db04/my-appointments.html
          cmp -s index.html db04/index.html
          cmp -s dashboard.html db04/dashboard.html
          cmp -s queue.html db04/queue.html

      - name: Commit finalized DB52 release
        shell: bash
        run: |
          rm -f .github/workflows/db52-finalize.yml scripts/db52_finalize_patch.py
          git config user.name 'MaxSolutionsMiss'
          git config user.email 'javadresa@maxpkgsolutions.com'
          git add -A
          git commit -m '[db52-finalized] Fix booking placement and simplify five-step scheduling'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
