name: DB74 clean publish
on:
  push:
    branches: [main]
    paths: ['.github/workflows/db74-clean-publish.yml']
permissions:
  contents: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0
      - name: Attach DB74 and remove prior overlays
        shell: python
        run: |
          from pathlib import Path
          import re
          root=Path('db04')
          pages=['dashboard.html','queue.html','reports.html','settings.html','admin.html','my-appointments.html']
          for name in pages:
              p=root/name
              s=p.read_text()
              s=re.sub(r'\s*<link rel="stylesheet" href="\./maxdock-db73-final\.css[^>]*>','',s)
              s=re.sub(r'\s*<script src="\./maxdock-db73-final\.js[^>]*></script>','',s)
              s=re.sub(r'\s*<link rel="stylesheet" href="\./maxdock-db74-clean\.css[^>]*>','',s)
              s=re.sub(r'\s*<script src="\./maxdock-db74-clean\.js[^>]*></script>','',s)
              s=s.replace('</head>','  <link rel="stylesheet" href="./maxdock-db74-clean.css?v=105-db74">\n</head>')
              s=s.replace('</body>','<script src="./maxdock-db74-clean.js?v=105-db74"></script>\n</body>')
              p.write_text(s)
          p=root/'dashboard.html';s=p.read_text()
          if 'bookingQrPanel' not in s:
              s=s.replace('<p>Your appointment has been recorded.</p>','<p>Your appointment has been recorded.</p><div class="bookingQrPanel" id="bookingQrPanel" hidden><img id="bookingQrImage" alt="Appointment check-in QR code"><div><strong>Appointment check-in code</strong><small>Present this QR code at the dock or open it from the confirmation email.</small></div></div>')
          p.write_text(s)
      - name: Commit live DB74
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add db04
          git commit -m "DB74 clean metric controls, consolidation warning, and QR confirmation" || exit 0
          git push origin gh-pages