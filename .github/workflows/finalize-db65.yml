name: Finalize DB65 coordinator navigation and layout
on:
  push:
    branches: [codex/db65-coordinator-navigation-layout]
permissions:
  contents: write
jobs:
  finalize:
    if: ${{ github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[db65-finalized]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/db65-coordinator-navigation-layout
          fetch-depth: 0
      - name: Apply DB65
        shell: bash
        run: |
          echo '[... ELLIPSIZATION ...]' | base64 -d > /tmp/db65.tgz
          mkdir -p /tmp/db65 db04
          tar -xzf /tmp/db65.tgz -C /tmp/db65
          for f in DEPLOYMENT_DB65.txt maxdock-config.js maxdock-db.js maxdock-db53.js maxdock-integration.js maxdock-my-appointments.js maxdock-db65.css maxdock-db65.js; do cp "/tmp/db65/$f" "$f"; cp "/tmp/db65/$f" "db04/$f"; done
      - name: Validate DB65
        shell: bash
        run: |
          set -euo pipefail
          for f in DEPLOYMENT_DB65.txt maxdock-config.js maxdock-db.js maxdock-db53.js maxdock-integration.js maxdock-my-appointments.js maxdock-db65.css maxdock-db65.js; do cmp "$f" "db04/$f"; done
          grep -q 'MaxDock-v86-DB65' maxdock-config.js
          grep -q 'maxdock-db65.css' maxdock-config.js
          grep -q 'maxdock-db65.js' maxdock-config.js
          grep -q 'dataset.maxdockRelease="db65"' maxdock-config.js
          ! grep -q 'maxdock-db60.js' maxdock-config.js
          ! grep -q 'maxdock-db60.css' maxdock-config.js
          grep -q 'COORDINATOR_ROUTES' maxdock-db53.js
          ! grep -q 'MutationObserver' maxdock-db53.js
          grep -q 'coordinatorRoutes' maxdock-db.js
          grep -q 'maxdock:my-appointments-metrics-rendered' maxdock-my-appointments.js
          grep -q 'myAppointmentsCustomizeDB65' maxdock-db65.js
          grep -q -- '--db65-appointment-columns' maxdock-db65.css
          node --check maxdock-config.js
          node --check maxdock-db.js
          node --check maxdock-db53.js
          node --check maxdock-integration.js
          node --check maxdock-my-appointments.js
          node --check maxdock-db65.js
      - name: Finalize
        shell: bash
        run: |
          rm -f .github/workflows/finalize-db65.yml
          git config user.name MaxSolutionsMiss
          git config user.email javadresa@maxpkgsolutions.com
          git add -A
          git commit -m '[db65-finalized] Restrict coordinator navigation and harmonize layouts'
          git push origin codex/db65-coordinator-navigation-layout