name: DB72 Targeted Repair
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/db72-targeted-repair.yml'
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0
      - name: Apply DB72 repair
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          css_path=Path('db04/maxdock.css')
          css=css_path.read_text()
          marker='/* DB72 TARGETED REPAIR */'
          block=r'''
/* DB72 TARGETED REPAIR */
body.db72Repair .maxdockDocumentUtilityRow{position:absolute!important;top:72px!important;right:24px!important;height:40px!important;min-height:40px!important;margin:0!important;padding:0!important;pointer-events:none!important;background:transparent!important;border:0!important}
body.db72Repair .maxdockDocumentTools{position:static!important;display:flex!important;gap:8px!important;pointer-events:auto!important}
body.db72Repair .pageWrap{padding-top:18px!important}
body.db72Repair .pageHead{min-height:40px!important;padding-right:110px!important;margin-top:0!important}
body.db72Repair[data-page="queue"] .queueFilters{display:flex!important;align-items:center!important;gap:14px!important;flex-wrap:wrap!important}
body.db72Repair[data-page="queue"] .queueFilterActions{display:flex!important;align-items:center!important;gap:10px!important;flex:1 1 auto!important}
body.db72Repair[data-page="queue"] #queueCustomize{order:9!important;margin-left:auto!important;position:relative!important;z-index:120!important}
body.db72Repair[data-page="queue"] #queueCustomize>summary{width:40px!important;height:40px!important;display:grid!important;place-items:center!important;font-size:0!important;list-style:none!important}
body.db72Repair[data-page="queue"] #queueCustomize>summary::-webkit-details-marker{display:none!important}
body.db72Repair[data-page="queue"] #queueCustomizeMenu{right:0!important;left:auto!important;z-index:140!important}
body.db72Repair[data-page="queue"] #queueMetrics{display:grid!important;grid-template-columns:repeat(5,minmax(0,1fr))!important;gap:10px!important;margin:12px 0 14px!important;overflow:visible!important}
body.db72Repair[data-page="queue"] #queueMetrics>.metric{position:relative!important;display:flex!important;flex-direction:column!important;justify-content:center!important;align-items:flex-start!important;height:86px!important;min-height:86px!important;padding:14px 16px!important;margin:0!important;overflow:hidden!important;border-radius:12px!important}
body.db72Repair[data-page="queue"] #queueMetrics>.metric::before,body.db72Repair[data-page="queue"] #queueMetrics>.metric::after{display:none!important;content:none!important}
body.db72Repair[data-page="queue"] #queueMetrics>.metric small{position:static!important;display:block!important;margin:0 0 8px!important;white-space:nowrap!important;overflow:hidden!important;text-overflow:ellipsis!important}
body.db72Repair[data-page="queue"] #queueMetrics>.metric strong{position:static!important;display:block!important;margin:0!important;font-size:24px!important;line-height:1!important}
body.db72Repair .settingsSectionActionsDB72{display:flex!important;justify-content:flex-end!important;gap:10px!important;margin-top:18px!important;padding-top:16px!important;border-top:1px solid #dbe5eb!important}
body.db72Repair .dockDirectionSelect{min-width:138px!important}
@media(max-width:1100px){body.db72Repair[data-page="queue"] #queueMetrics{grid-template-columns:repeat(3,minmax(0,1fr))!important}}
@media(max-width:700px){body.db72Repair .maxdockDocumentUtilityRow{top:66px!important;right:14px!important}body.db72Repair .pageHead{padding-right:96px!important}body.db72Repair[data-page="queue"] #queueMetrics{grid-template-columns:repeat(2,minmax(0,1fr))!important}}
'''
          if marker not in css:
              css_path.write_text(css+block)

          db_path=Path('db04/maxdock-db.js')
          db=db_path.read_text()
          db=db.replace("const dock=dockInputs[i],payload={name:dock.name,sort_order:i+1,is_active:true};","const dock=dockInputs[i],payload={name:dock.name,sort_order:i+1,is_active:true,direction_mode:['inbound','outbound'].includes(dock.directionMode)?dock.directionMode:'both'};")
          js_marker='/* DB72 TARGETED REPAIR JS */'
          js=r'''
/* DB72 TARGETED REPAIR JS */
(function(){
  'use strict';
  const PAGE=(document.body.dataset.page||'').toLowerCase();
  const $=id=>document.getElementById(id);
  function fixLayout(){document.body.classList.add('db72Repair')}
  function bindQueue(){
    if(PAGE!=='queue')return;
    const filters=document.querySelector('.queueFilters'),gear=$('queueCustomize');
    if(filters&&gear&&gear.parentElement!==filters)filters.appendChild(gear);
    const summary=gear?.querySelector(':scope>summary');
    if(summary&&!summary.dataset.db72Bound){summary.dataset.db72Bound='true';summary.addEventListener('click',e=>{e.preventDefault();e.stopImmediatePropagation();gear.open=!gear.open},{capture:true})}
    const full=$('openQueueDisplay');
    if(full&&!full.dataset.db72Bound){full.dataset.db72Bound='true';full.addEventListener('click',e=>{e.preventDefault();e.stopImmediatePropagation();if(typeof window.openQueueDisplay==='function')window.openQueueDisplay();else{document.body.classList.add('queueDisplayMode');document.documentElement.requestFullscreen?.().catch(()=>{})}},{capture:true})}
  }
  function bindReport(){
    if(PAGE!=='reports')return;
    const details=$('db71-reports-metric-customize'),summary=details?.querySelector(':scope>summary');
    if(summary&&!summary.dataset.db72Bound){summary.dataset.db72Bound='true';summary.addEventListener('click',e=>{e.preventDefault();e.stopImmediatePropagation();details.open=!details.open},{capture:true})}
  }
  function settingsActions(){
    if(PAGE!=='settings')return;
    document.querySelectorAll('.settingsGroup').forEach(section=>{if(section.querySelector('.settingsSectionActionsDB72'))return;const row=document.createElement('div');row.className='settingsSectionActionsDB72';row.innerHTML='<button type="button" class="secondaryBtn" data-db72-reset>Reset Default</button><button type="button" class="greenBtn" data-db72-save>Save Settings</button>';row.querySelector('[data-db72-save]').onclick=()=>window.saveSettings?.();row.querySelector('[data-db72-reset]').onclick=()=>window.resetSettings?.();section.appendChild(row)})
  }
  function apply(){fixLayout();bindQueue();bindReport();settingsActions()}
  function init(){apply();[150,400,900,1800].forEach(t=>setTimeout(apply,t))}
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init,{once:true});else init();
})();
'''
          if js_marker not in db:
              db+=js
          db_path.write_text(db)

          integ_path=Path('db04/maxdock-integration.js')
          s=integ_path.read_text()
          s=s.replace("truckTypeCodes:[...(locationData?.dockTruckCodesByDock?.get(dock.id)||new Set(allTruckCodes))]\n    }));","truckTypeCodes:[...(locationData?.dockTruckCodesByDock?.get(dock.id)||new Set(allTruckCodes))],\n      directionMode:['inbound','outbound'].includes(dock.direction_mode)?dock.direction_mode:'both'\n    }));")
          s=s.replace('<thead><tr><th>Dock Door</th>${truckTypes.map(truck=>`<th title="${esc(truck.name)}">${esc(truck.name)}</th>`).join("")}<th class="dockMatrixActionCell">Action</th></tr></thead>','<thead><tr><th>Dock Door</th><th class="dockDirectionHeader">Direction</th>${truckTypes.map(truck=>`<th title="${esc(truck.name)}">${esc(truck.name)}</th>`).join("")}<th class="dockMatrixActionCell">Action</th></tr></thead>')
          s=s.replace('        ${truckTypes.map(truck=>`<td><label class="dockMatrixCheck"','        <td><select class="dockDirectionSelect" data-dock-index="${index}" aria-label="${esc(dock.name)} appointment direction"><option value="both" ${dock.directionMode==="both"?"selected":""}>Both</option><option value="inbound" ${dock.directionMode==="inbound"?"selected":""}>Inbound only</option><option value="outbound" ${dock.directionMode==="outbound"?"selected":""}>Outbound only</option></select></td>\n        ${truckTypes.map(truck=>`<td><label class="dockMatrixCheck"')
          s=s.replace("truckTypeCodes:[...document.querySelectorAll(`.dockTruckCheck[data-dock-index=\"${index}\"]:checked`)].map(check=>check.value)\n    }));","truckTypeCodes:[...document.querySelectorAll(`.dockTruckCheck[data-dock-index=\"${index}\"]:checked`)].map(check=>check.value),\n      directionMode:document.querySelector(`.dockDirectionSelect[data-dock-index=\"${index}\"]`)?.value||'both'\n    }));")
          s=s.replace("dockDraft.push({id:null,name:`Dock ${dockDraft.length+1}`,truckTypeCodes:(db.getLocationData()?.truckTypes||[]).map(truck=>truck.code)});","dockDraft.push({id:null,name:`Dock ${dockDraft.length+1}`,truckTypeCodes:(db.getLocationData()?.truckTypes||[]).map(truck=>truck.code),directionMode:'both'});")
          s=s.replace("const docks=dockDraft.map(dock=>({...dock,name:dock.name.trim(),truckTypeCodes:[...new Set(dock.truckTypeCodes||[])]})).filter(dock=>dock.name);","const docks=dockDraft.map(dock=>({...dock,name:dock.name.trim(),truckTypeCodes:[...new Set(dock.truckTypeCodes||[])],directionMode:['inbound','outbound'].includes(dock.directionMode)?dock.directionMode:'both'})).filter(dock=>dock.name);")
          s=s.replace("dockDraft=defaultSettings.docks.map((name,index)=>({id:existing[index]?.id||null,name,truckTypeCodes:allTruckCodes.slice()}));","dockDraft=defaultSettings.docks.map((name,index)=>({id:existing[index]?.id||null,name,truckTypeCodes:allTruckCodes.slice(),directionMode:'both'}));")
          integ_path.write_text(s)
          PY
          node --check db04/maxdock-db.js
          node --check db04/maxdock-integration.js
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add db04/maxdock.css db04/maxdock-db.js db04/maxdock-integration.js
          git diff --cached --quiet || git commit -m "DB72 repair queue controls, shared spacing, and dock direction settings"
          git push origin gh-pages
