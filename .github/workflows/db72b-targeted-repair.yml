name: DB72B Targeted Repair
on:
  push:
    branches: [main]
    paths: ['.github/workflows/db72b-targeted-repair.yml']
  workflow_dispatch:
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0
      - name: Append repair layer
        run: |
          if ! grep -q 'DB72B TARGETED REPAIR' db04/maxdock.css; then
          cat >> db04/maxdock.css <<'EOF'

/* DB72B TARGETED REPAIR */
body.db72b .maxdockDocumentUtilityRow{position:absolute!important;top:72px!important;right:24px!important;height:40px!important;min-height:40px!important;margin:0!important;padding:0!important;background:transparent!important;border:0!important;pointer-events:none!important}
body.db72b .maxdockDocumentTools{position:static!important;pointer-events:auto!important}
body.db72b .pageWrap{padding-top:18px!important}
body.db72b .pageHead{margin-top:0!important;padding-right:110px!important;min-height:40px!important}
body.db72b[data-page="queue"] .queueFilters{display:flex!important;align-items:center!important;gap:12px!important;flex-wrap:wrap!important}
body.db72b[data-page="queue"] .queueFilterActions{display:flex!important;align-items:center!important;gap:10px!important;flex:1 1 auto!important}
body.db72b[data-page="queue"] #queueCustomize{margin-left:auto!important;position:relative!important;z-index:120!important}
body.db72b[data-page="queue"] #queueCustomizeMenu{right:0!important;left:auto!important;z-index:140!important}
body.db72b[data-page="queue"] #queueMetrics{display:grid!important;grid-template-columns:repeat(5,minmax(0,1fr))!important;gap:10px!important;margin:12px 0 14px!important;overflow:visible!important}
body.db72b[data-page="queue"] #queueMetrics>.metric{position:relative!important;display:flex!important;flex-direction:column!important;justify-content:center!important;align-items:flex-start!important;height:86px!important;min-height:86px!important;padding:14px 16px!important;margin:0!important;overflow:hidden!important;border-radius:12px!important}
body.db72b[data-page="queue"] #queueMetrics>.metric::before,body.db72b[data-page="queue"] #queueMetrics>.metric::after{display:none!important;content:none!important}
body.db72b[data-page="queue"] #queueMetrics>.metric small{position:static!important;margin:0 0 8px!important;white-space:nowrap!important;overflow:hidden!important;text-overflow:ellipsis!important}
body.db72b[data-page="queue"] #queueMetrics>.metric strong{position:static!important;margin:0!important;font-size:24px!important;line-height:1!important}
body.db72b .settingsSectionActionsDB72{display:flex!important;justify-content:flex-end!important;gap:10px!important;margin-top:18px!important;padding-top:16px!important;border-top:1px solid #dbe5eb!important}
body.db72b .dockDirectionSelect{min-width:138px!important}
@media(max-width:1100px){body.db72b[data-page="queue"] #queueMetrics{grid-template-columns:repeat(3,minmax(0,1fr))!important}}
@media(max-width:700px){body.db72b .maxdockDocumentUtilityRow{top:66px!important;right:14px!important}body.db72b .pageHead{padding-right:96px!important}body.db72b[data-page="queue"] #queueMetrics{grid-template-columns:repeat(2,minmax(0,1fr))!important}}
EOF
          fi
          if ! grep -q 'DB72B TARGETED REPAIR JS' db04/maxdock-db.js; then
          cat >> db04/maxdock-db.js <<'EOF'

/* DB72B TARGETED REPAIR JS */
(function(){
'use strict';
const PAGE=(document.body.dataset.page||'').toLowerCase(),$=id=>document.getElementById(id);
function queue(){if(PAGE!=='queue')return;const f=document.querySelector('.queueFilters'),g=$('queueCustomize');if(f&&g&&g.parentElement!==f)f.appendChild(g);const s=g?.querySelector(':scope>summary');if(s&&!s.dataset.db72b){s.dataset.db72b='1';s.addEventListener('click',e=>{e.preventDefault();e.stopImmediatePropagation();g.open=!g.open},{capture:true})}const b=$('openQueueDisplay');if(b&&!b.dataset.db72b){b.dataset.db72b='1';b.addEventListener('click',e=>{e.preventDefault();e.stopImmediatePropagation();if(typeof window.openQueueDisplay==='function')window.openQueueDisplay();else{document.body.classList.add('queueDisplayMode');document.documentElement.requestFullscreen?.().catch(()=>{})}},{capture:true})}}
function reports(){if(PAGE!=='reports')return;const d=$('db71-reports-metric-customize'),s=d?.querySelector(':scope>summary');if(s&&!s.dataset.db72b){s.dataset.db72b='1';s.addEventListener('click',e=>{e.preventDefault();e.stopImmediatePropagation();d.open=!d.open},{capture:true})}}
function settings(){if(PAGE!=='settings')return;document.querySelectorAll('.settingsGroup').forEach(x=>{if(x.querySelector('.settingsSectionActionsDB72'))return;const r=document.createElement('div');r.className='settingsSectionActionsDB72';r.innerHTML='<button type="button" class="secondaryBtn" data-r>Reset Default</button><button type="button" class="greenBtn" data-s>Save Settings</button>';r.querySelector('[data-s]').onclick=()=>window.saveSettings?.();r.querySelector('[data-r]').onclick=()=>window.resetSettings?.();x.appendChild(r)})}
function apply(){document.body.classList.add('db72b');queue();reports();settings()}
function init(){apply();[150,400,900,1800].forEach(t=>setTimeout(apply,t))}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init,{once:true});else init();
})();
EOF
          fi
      - name: Add dock direction persistence
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('db04/maxdock-db.js');s=p.read_text();s=s.replace("const dock=dockInputs[i],payload={name:dock.name,sort_order:i+1,is_active:true};","const dock=dockInputs[i],payload={name:dock.name,sort_order:i+1,is_active:true,direction_mode:['inbound','outbound'].includes(dock.directionMode)?dock.directionMode:'both'};");p.write_text(s)
          p=Path('db04/maxdock-integration.js');s=p.read_text()
          s=s.replace("truckTypeCodes:[...(locationData?.dockTruckCodesByDock?.get(dock.id)||new Set(allTruckCodes))]\n    }));","truckTypeCodes:[...(locationData?.dockTruckCodesByDock?.get(dock.id)||new Set(allTruckCodes))],\n      directionMode:['inbound','outbound'].includes(dock.direction_mode)?dock.direction_mode:'both'\n    }));")
          s=s.replace('<thead><tr><th>Dock Door</th>${truckTypes.map(truck=>`<th title="${esc(truck.name)}">${esc(truck.name)}</th>`).join("")}<th class="dockMatrixActionCell">Action</th></tr></thead>','<thead><tr><th>Dock Door</th><th>Direction</th>${truckTypes.map(truck=>`<th title="${esc(truck.name)}">${esc(truck.name)}</th>`).join("")}<th class="dockMatrixActionCell">Action</th></tr></thead>')
          s=s.replace('        ${truckTypes.map(truck=>`<td><label class="dockMatrixCheck"','        <td><select class="dockDirectionSelect" data-dock-index="${index}"><option value="both" ${dock.directionMode==="both"?"selected":""}>Both</option><option value="inbound" ${dock.directionMode==="inbound"?"selected":""}>Inbound only</option><option value="outbound" ${dock.directionMode==="outbound"?"selected":""}>Outbound only</option></select></td>\n        ${truckTypes.map(truck=>`<td><label class="dockMatrixCheck"')
          s=s.replace("truckTypeCodes:[...document.querySelectorAll(`.dockTruckCheck[data-dock-index=\"${index}\"]:checked`)].map(check=>check.value)\n    }));","truckTypeCodes:[...document.querySelectorAll(`.dockTruckCheck[data-dock-index=\"${index}\"]:checked`)].map(check=>check.value),\n      directionMode:document.querySelector(`.dockDirectionSelect[data-dock-index=\"${index}\"]`)?.value||'both'\n    }));")
          s=s.replace("dockDraft.push({id:null,name:`Dock ${dockDraft.length+1}`,truckTypeCodes:(db.getLocationData()?.truckTypes||[]).map(truck=>truck.code)});","dockDraft.push({id:null,name:`Dock ${dockDraft.length+1}`,truckTypeCodes:(db.getLocationData()?.truckTypes||[]).map(truck=>truck.code),directionMode:'both'});")
          s=s.replace("const docks=dockDraft.map(dock=>({...dock,name:dock.name.trim(),truckTypeCodes:[...new Set(dock.truckTypeCodes||[])]})).filter(dock=>dock.name);","const docks=dockDraft.map(dock=>({...dock,name:dock.name.trim(),truckTypeCodes:[...new Set(dock.truckTypeCodes||[])],directionMode:['inbound','outbound'].includes(dock.directionMode)?dock.directionMode:'both'})).filter(dock=>dock.name);")
          s=s.replace("dockDraft=defaultSettings.docks.map((name,index)=>({id:existing[index]?.id||null,name,truckTypeCodes:allTruckCodes.slice()}));","dockDraft=defaultSettings.docks.map((name,index)=>({id:existing[index]?.id||null,name,truckTypeCodes:allTruckCodes.slice(),directionMode:'both'}));")
          p.write_text(s)
          PY
          node --check db04/maxdock-db.js
          node --check db04/maxdock-integration.js
      - name: Publish
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add db04/maxdock.css db04/maxdock-db.js db04/maxdock-integration.js
          git diff --cached --quiet || git commit -m 'DB72B targeted repair'
          git push origin gh-pages
