name: Finalize DB56 compactness and login-position polish

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'codex/db56-final-compactness-login-position'
    runs-on: ubuntu-latest
    steps:
      - name: Check out DB56 branch
        uses: actions/checkout@v4
        with:
          ref: codex/db56-final-compactness-login-position
          fetch-depth: 0

      - name: Build mirrored DB56 release
        shell: bash
        run: |
          cp maxdock-db56.js db04/maxdock-db56.js
          cp maxdock-db56.css db04/maxdock-db56.css
          cp DEPLOYMENT_DB56.txt db04/DEPLOYMENT_DB56.txt
          python - <<'PY'
          from pathlib import Path
          path=Path('maxdock-config.js')
          text=path.read_text()
          text=text.replace('MaxDock-v76-DB55','MaxDock-v77-DB56')
          text=text.replace('76-db55','77-db56')
          css='  loadCss("maxdock-db56.css","77-db56","db56");\n'
          if 'maxdock-db56.css' not in text:
              text=text.replace('  loadCss("maxdock-db55.css","77-db56","db55");\n', '  loadCss("maxdock-db55.css","77-db56","db55");\n'+css)
          js='    await loadScript("maxdock-db56.js","77-db56","db56");\n'
          if 'maxdock-db56.js' not in text:
              text=text.replace('    await loadScript("maxdock-db55.js","77-db56","db55");\n', '    await loadScript("maxdock-db55.js","77-db56","db55");\n'+js)
          text=text.replace('document.documentElement.dataset.maxdockRelease="db55"','document.documentElement.dataset.maxdockRelease="db56"')
          text=text.replace('DB55 · compact horizontal KPI cards active','DB56 · final compactness and login-position polish active')
          path.write_text(text)
          Path('db04/maxdock-config.js').write_text(text)
          PY

      - name: Validate DB56 runtime
        shell: bash
        run: |
          grep -q 'MaxDock-v77-DB56' maxdock-config.js
          grep -q 'maxdock-db56.css' maxdock-config.js
          grep -q 'maxdock-db56.js' maxdock-config.js
          grep -q 'DB56 · final compactness and login-position polish active' maxdock-config.js
          grep -q 'height:62px' maxdock-db56.css
          grep -q 'translateY(clamp(34px,9vh,86px))' maxdock-db56.css
          grep -q 'finalPolishDB56' maxdock-db56.js
          node --check maxdock-config.js
          node --check maxdock-db56.js
          cmp -s maxdock-config.js db04/maxdock-config.js
          cmp -s maxdock-db56.js db04/maxdock-db56.js
          cmp -s maxdock-db56.css db04/maxdock-db56.css
          cmp -s DEPLOYMENT_DB56.txt db04/DEPLOYMENT_DB56.txt

      - name: Commit finalized DB56 release
        shell: bash
        run: |
          rm -f .github/workflows/finalize-db56.yml
          git config user.name 'MaxSolutionsMiss'
          git config user.email 'javadresa@maxpkgsolutions.com'
          git add -A
          if git diff --cached --quiet; then exit 0; fi
          git commit -m '[db56-finalized] Reduce KPI height and lower login panel'
          git push origin HEAD:codex/db56-final-compactness-login-position
