name: Finalize DB64 stable interface harmonization

on:
  push:
    branches:
      - codex/db64-stable-interface-harmonization

permissions:
  contents: write

jobs:
  finalize:
    if: ${{ github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[db64-finalized]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/db64-stable-interface-harmonization
          fetch-depth: 0

      - name: Apply DB64 files
        shell: bash
        run: |
          echo '' | base64 -d | gzip -d > /tmp/apply-db64.py
          python /tmp/apply-db64.py

      - name: Validate DB64
        shell: bash
        run: |
          set -euo pipefail
          for file in DEPLOYMENT_DB64.txt maxdock-config.js maxdock-db64.css maxdock-db64.js maxdock.js maxdock-integration.js maxdock-queue.js dashboard.html queue.html reports.html my-appointments.html; do
            cmp "$file" "db04/$file"
          done
          grep -q 'MaxDock-v85-DB64' maxdock-config.js
          grep -q 'maxdock-db64.css' maxdock-config.js
          grep -q 'maxdock-db64.js' maxdock-config.js
          grep -q 'dataset.maxdockRelease="db64"' maxdock-config.js
          ! grep -q 'loadScript("maxdock-db61.js"' maxdock-config.js
          ! grep -q 'loadScript("maxdock-db62.js"' maxdock-config.js
          ! grep -q 'loadScript("maxdock-db63.js"' maxdock-config.js
          ! grep -q 'loadCss("maxdock-db61.css"' maxdock-config.js
          grep -q 'systemAdminLocation' maxdock-db64.js
          grep -q 'db64ReportCustomize' maxdock-db64.js
          grep -q 'reportSectionWorkspace>.sectionWorkspaceRail' maxdock-db64.css
          grep -q 'dashboardRangeHost>.rangeMetric' maxdock-db64.css
          grep -q 'scale===120 ? 96' maxdock.js
          grep -q '3 minutes' dashboard.html
          grep -q '3 minutes' queue.html
          grep -q '3 minutes' reports.html
          grep -q '3 minutes' my-appointments.html
          node --check maxdock-config.js
          node --check maxdock-db64.js
          node --check maxdock.js
          node --check maxdock-integration.js
          node --check maxdock-queue.js

      - name: Finalize review commit
        shell: bash
        run: |
          rm -f .github/workflows/finalize-db64.yml
          git config user.name 'MaxSolutionsMiss'
          git config user.email 'javadresa@maxpkgsolutions.com'
          git add -A
          git commit -m '[db64-finalized] Stabilize and harmonize operational interface'
          git push origin codex/db64-stable-interface-harmonization
