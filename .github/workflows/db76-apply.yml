name: Apply DB76 dashboard audit

on:
  push:
    branches:
      - agent/maxdock-db76-full-functional-audit
    paths:
      - scripts/apply-db76-dashboard.mjs
      - .github/workflows/db76-apply.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/maxdock-db76-full-functional-audit
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: node scripts/apply-db76-dashboard.mjs
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard.html db04/dashboard.html maxdock-db.js db04/maxdock-db.js maxdock-integration.js db04/maxdock-integration.js maxdock-mis.js db04/maxdock-mis.js maxdock-my-appointments.js db04/maxdock-my-appointments.js maxdock-queue.js db04/maxdock-queue.js
          if git diff --cached --quiet; then
            echo "No DB76 transformation changes required."
          else
            git commit -m "DB76 apply dashboard and route cache markers"
            git push origin HEAD:agent/maxdock-db76-full-functional-audit
          fi
