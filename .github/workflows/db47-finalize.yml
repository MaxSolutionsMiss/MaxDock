name: Finalize DB47 release references

on:
  push:
    branches:
      - codex/db47-left-rail-preview

permissions:
  contents: write

jobs:
  finalize:
    if: ${{ !contains(github.event.head_commit.message, '[db47-finalized]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out DB47 branch
        uses: actions/checkout@v4
        with:
          ref: codex/db47-left-rail-preview
          fetch-depth: 0

      - name: Replace DB46 cache references
        shell: bash
        run: |
          find . -type f \( -name '*.html' -o -name '*.js' -o -name '*.css' \) -not -path './.git/*' -print0 \
            | xargs -0 sed -i 's/67-db46/68-db47/g'

      - name: Validate DB47 runtime
        shell: bash
        run: |
          if grep -RIn --include='*.html' --include='*.js' --include='*.css' '67-db46' .; then
            echo 'Old DB46 runtime references remain.'
            exit 1
          fi
          node --check maxdock-config.js
          node --check maxdock-db.js
          node --check maxdock-integration.js
          node --check maxdock-queue.js
          node --check maxdock-mis.js
          node --check maxdock-db47.js
          python - <<'PY'
          from pathlib import Path
          names = [
              'admin.html','dashboard.html','data.html','index.html','login.html',
              'my-appointments.html','queue.html','reports.html','set-password.html','settings.html',
              'maxdock-config.js','maxdock-db.js','maxdock-db04.css','maxdock-integration.js',
              'maxdock-mis.js','maxdock-queue.js','maxdock-db47.css','maxdock-db47.js',
              'DEPLOYMENT_DB47.txt'
          ]
          mismatches=[]
          for name in names:
              root=Path(name)
              mirror=Path('db04')/name
              if not root.exists() or not mirror.exists() or root.read_bytes()!=mirror.read_bytes():
                  mismatches.append(name)
          if mismatches:
              raise SystemExit('Root/db04 parity failed: '+', '.join(mismatches))
          print('Root/db04 parity passed.')
          PY

      - name: Commit finalized references and remove workflow
        shell: bash
        run: |
          rm -f .github/workflows/db47-finalize.yml
          git config user.name 'MaxSolutionsMiss'
          git config user.email 'javadresa@maxpkgsolutions.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No finalization changes were required.'
            exit 0
          fi
          git commit -m '[db47-finalized] Complete DB47 cache and routing reference sweep'
          git push origin HEAD:codex/db47-left-rail-preview
