name: Finalize DB67 stable interface controller

on:
  push:
    branches: [codex/db67-stable-controller-interface]
    paths:
      - '.github/workflows/finalize-db67.yml'

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out review branch
        uses: actions/checkout@v4
        with:
          ref: codex/db67-stable-controller-interface
          fetch-depth: 0

      - name: Install DB67 assets
        shell: bash
        run: |
          echo '' | base64 -d > /tmp/db67-assets.tar.gz
          tar -xzf /tmp/db67-assets.tar.gz -C .

      - name: Validate DB67
        shell: bash
        run: |
          set -euo pipefail
          grep -q 'MaxDock-v88-DB67' maxdock-config.js
          grep -q 'maxdock-db67.css' maxdock-config.js
          grep -q 'maxdock-db67.js' maxdock-config.js
          grep -q 'dataset.maxdockRelease="db67"' maxdock-config.js
          grep -q 'DB67 · stable controller and operational interface standard active' maxdock-config.js
          for retired in maxdock-db49.js maxdock-db50.js maxdock-db52.js maxdock-db53.js maxdock-db54.js maxdock-db55.js maxdock-db56.js maxdock-db64.js maxdock-db65.js maxdock-db66.js; do
            ! grep -q "loadScript(\"$retired\"" maxdock-config.js
          done
          grep -q -- '--db67-card-height:78px' maxdock-db67.css
          grep -q 'role==="coordinator"' maxdock-db67.js
          grep -q 'db67SystemAdmin' maxdock-db67.js
          grep -q 'Appointment list' maxdock-db67.js
          node --check maxdock-config.js
          node --check maxdock-db67.js
          cmp -s DEPLOYMENT_DB67.txt db04/DEPLOYMENT_DB67.txt
          cmp -s maxdock-config.js db04/maxdock-config.js
          cmp -s maxdock-db67.css db04/maxdock-db67.css
          cmp -s maxdock-db67.js db04/maxdock-db67.js

      - name: Commit finalized review
        shell: bash
        run: |
          rm -f .github/workflows/finalize-db67.yml
          git config user.name 'MaxSolutionsMiss'
          git config user.email 'javadresa@maxpkgsolutions.com'
          git add -A
          git commit -m '[db67-finalized] Replace competing layout runtimes with one stable controller'
          git push origin HEAD:codex/db67-stable-controller-interface
