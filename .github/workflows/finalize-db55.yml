name: Finalize DB55 horizontal KPI card draft

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'codex/db55-horizontal-kpi-cards'
    runs-on: ubuntu-latest
    steps:
      - name: Check out DB55 branch
        uses: actions/checkout@v4
        with:
          ref: codex/db55-horizontal-kpi-cards
          fetch-depth: 0

      - name: Build mirrored DB55 release
        shell: bash
        run: |
          cp maxdock-db55.js db04/maxdock-db55.js
          cp maxdock-db55.css db04/maxdock-db55.css
          cp DEPLOYMENT_DB55.txt db04/DEPLOYMENT_DB55.txt
          python - <<'PY'
          from pathlib import Path
          path=Path('maxdock-config.js')
          text=path.read_text()
          text=text.replace('MaxDock-v75-DB54','MaxDock-v76-DB55')
          text=text.replace('75-db54','76-db55')
          css='  loadCss("maxdock-db55.css","76-db55","db55");\n'
          if 'maxdock-db55.css' not in text:
              text=text.replace('  loadCss("maxdock-db54.css","76-db55","db54");\n', '  loadCss("maxdock-db54.css","76-db55","db54");\n'+css)
          js='    await loadScript("maxdock-db55.js","76-db55","db55");\n'
          if 'maxdock-db55.js' not in text:
              text=text.replace('    await loadScript("maxdock-db54.js","76-db55","db54");\n', '    await loadScript("maxdock-db54.js","76-db55","db54");\n'+js)
          text=text.replace('document.documentElement.dataset.maxdockRelease="db54"','document.documentElement.dataset.maxdockRelease="db55"')
          text=text.replace('DB54 · compact appointment filtering and unified dashboard commands active','DB55 · compact horizontal KPI cards active')
          path.write_text(text)
          Path('db04/maxdock-config.js').write_text(text)
          PY

      - name: Validate DB55 runtime
        shell: bash
        run: |
          grep -q 'MaxDock-v76-DB55' maxdock-config.js
          grep -q 'maxdock-db55.css' maxdock-config.js
          grep -q 'maxdock-db55.js' maxdock-config.js
          grep -q 'DB55 · compact horizontal KPI cards active' maxdock-config.js
          grep -q 'horizontalMetricsGridDB55' maxdock-db55.css
          grep -q 'horizontalMetricCardDB55' maxdock-db55.js
          node --check maxdock-config.js
          node --check maxdock-db55.js
          cmp -s maxdock-config.js db04/maxdock-config.js
          cmp -s maxdock-db55.js db04/maxdock-db55.js
          cmp -s maxdock-db55.css db04/maxdock-db55.css
          cmp -s DEPLOYMENT_DB55.txt db04/DEPLOYMENT_DB55.txt

      - name: Commit finalized DB55 release
        shell: bash
        run: |
          rm -f .github/workflows/finalize-db55.yml
          git config user.name 'MaxSolutionsMiss'
          git config user.email 'javadresa@maxpkgsolutions.com'
          git add -A
          if git diff --cached --quiet; then exit 0; fi
          git commit -m '[db55-finalized] Compact dashboard and appointment KPI cards'
          git push origin HEAD:codex/db55-horizontal-kpi-cards
