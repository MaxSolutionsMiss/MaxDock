name: Finalize DB59 matched KPI cards

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'codex/db59-match-dashboard-appointment-kpis'
    runs-on: ubuntu-latest
    steps:
      - name: Check out DB59 branch
        uses: actions/checkout@v4
        with:
          ref: codex/db59-match-dashboard-appointment-kpis
          fetch-depth: 0

      - name: Validate DB59 runtime and mirrors
        shell: bash
        run: |
          grep -q 'MaxDock-v80-DB59' maxdock-config.js
          grep -q 'maxdock-db59.css' maxdock-config.js
          grep -q 'maxdock-db59.js' maxdock-config.js
          grep -q 'maxdock-db58.js' maxdock-config.js
          grep -q 'DB59 · matched dashboard and appointment KPI cards active' maxdock-config.js
          grep -q 'height:72px' maxdock-db59.css
          grep -q 'repeat(auto-fit,minmax(180px,1fr))' maxdock-db59.css
          grep -q 'min-width:0!important' maxdock-db59.css
          grep -q 'const height=compact?"70px":"72px"' maxdock-db59.js
          grep -q 'repeat(auto-fit,minmax(180px,1fr))' maxdock-db59.js
          node --check maxdock-config.js
          node --check maxdock-db59.js
          cmp -s maxdock-config.js db04/maxdock-config.js
          cmp -s maxdock-db59.js db04/maxdock-db59.js
          cmp -s maxdock-db59.css db04/maxdock-db59.css
          cmp -s DEPLOYMENT_DB59.txt db04/DEPLOYMENT_DB59.txt

      - name: Commit finalized DB59 release
        shell: bash
        run: |
          rm -f .github/workflows/finalize-db59.yml
          git config user.name 'MaxSolutionsMiss'
          git config user.email 'javadresa@maxpkgsolutions.com'
          git add -A
          if git diff --cached --quiet; then exit 0; fi
          git commit -m '[db59-finalized] Match dashboard and appointment KPI cards'
          git push origin HEAD:codex/db59-match-dashboard-appointment-kpis
