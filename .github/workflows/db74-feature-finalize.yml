name: DB74 feature finalize
on:
  push:
    branches: [main]
    paths: ['.github/workflows/db74-feature-finalize.yml']
permissions:
  contents: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0
      - name: Append DB74 data persistence
        run: |
          cat >> db04/maxdock-db74-clean.js <<'EOF'

(function(){
'use strict';
const $=id=>document.getElementById(id);
async function loadConsolidationSetting(){
 const db=window.MaxDockDB,current=db?.getCurrentLocation?.();if(!db?.client||!current)return;
 try{const r=await db.client.from('location_settings').select('suggest_same_day_consolidation').eq('location_id',current.id).single();if(r.error)throw r.error;window.settings=window.settings||{};window.settings.suggestSameDayConsolidation=r.data?.suggest_same_day_consolidation!==false;const box=$('setSuggestSameDayConsolidation');if(box)box.checked=window.settings.suggestSameDayConsolidation}catch(e){console.warn('Unable to load consolidation preference',e)}
}
function wrapSettingsSave(){
 if((document.body.dataset.page||'')!=='settings'||typeof window.saveSettings!=='function'||window.saveSettings.db74Persist)return;
 const prior=window.saveSettings;window.saveSettings=async function(){const result=await prior.apply(this,arguments);const db=window.MaxDockDB,current=db?.getCurrentLocation?.();if(db?.client&&current){const enabled=$('setSuggestSameDayConsolidation')?.checked!==false;const r=await db.client.from('location_settings').update({suggest_same_day_consolidation:enabled}).eq('location_id',current.id);if(r.error)throw r.error;window.settings=window.settings||{};window.settings.suggestSameDayConsolidation=enabled}return result};window.saveSettings.db74Persist=true;
}
function installEmailLink(){
 window.openEmailDraft=function(){const b=window.lastBooked;if(!b)return alert('Complete a booking first.');const link=b.checkinUrl||`${location.origin}${location.pathname}?checkin=${encodeURIComponent(b.ref||b.id||'')}`;const body=`MaxDock Appointment Confirmation\nBooking Reference: ${b.ref||''}\nFacility: Max Solutions – ${b.location||''}\nDate: ${b.date||''}\nTime: ${b.start||''} – ${b.end||''}\nDirection: ${b.direction||''}\nAppointment Type: ${b.type||''}\nTruck / Skids: ${b.truck||''} / ${b.skids||0}\nPO / BOL / Job #: ${b.job||''}\nCheck-in QR link: ${link}`;location.href=`mailto:${encodeURIComponent(b.email||'')}?subject=${encodeURIComponent('MaxDock Confirmation – '+(b.ref||''))}&body=${encodeURIComponent(body)}`}
}
function init(){setTimeout(async()=>{await loadConsolidationSetting();wrapSettingsSave();installEmailLink()},350)}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init,{once:true});else init();
})();
EOF
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add db04/maxdock-db74-clean.js
          git commit -m "DB74 persist consolidation setting and include QR check-in email link" || exit 0
          git push origin gh-pages