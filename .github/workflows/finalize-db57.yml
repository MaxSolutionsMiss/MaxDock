name: Finalize DB57 enforced compact KPI balance

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'codex/db57-enforced-compact-kpi-balance'
    runs-on: ubuntu-latest
    steps:
      - name: Check out DB57 branch
        uses: actions/checkout@v4
        with:
          ref: codex/db57-enforced-compact-kpi-balance
          fetch-depth: 0

      - name: Build mirrored DB57 release
        shell: bash
        run: |
          mkdir -p db04
          cp maxdock-db57.js db04/maxdock-db57.js
          cp maxdock-db57.css db04/maxdock-db57.css
          cp DEPLOYMENT_DB57.txt db04/DEPLOYMENT_DB57.txt
          python - <<'PY'
          from pathlib import Path
          path=Path('maxdock-config.js')
          text=path.read_text()
          text=text.replace('MaxDock-v77-DB56','MaxDock-v78-DB57')
          text=text.replace('77-db56','78-db57')
          css='  loadCss("maxdock-db57.css","78-db57","db57");\n'
          if 'maxdock-db57.css' not in text:
              text=text.replace('  loadCss("maxdock-db56.css","78-db57","db56");\n', '  loadCss("maxdock-db56.css","78-db57","db56");\n'+css)
          js='    await loadScript("maxdock-db57.js","78-db57","db57");\n'
          if 'maxdock-db57.js' not in text:
              text=text.replace('    await loadScript("maxdock-db56.js","78-db57","db56");\n', '    await loadScript("maxdock-db56.js","78-db57","db56");\n'+js)
          text=text.replace('document.documentElement.dataset.maxdockRelease="db56"','document.documentElement.dataset.maxdockRelease="db57"')
          text=text.replace('DB56 · final compactness and login-position polish active','DB57 · enforced compact KPI height and balanced content active')
          path.write_text(text)
          Path('db04/maxdock-config.js').write_text(text)
          PY

      - name: Validate DB57 runtime
        shell: bash
        run: |
          grep -q 'MaxDock-v78-DB57' maxdock-config.js
          grep -q 'maxdock-db57.css' maxdock-config.js
          grep -q 'maxdock-db57.js' maxdock-config.js
          grep -q 'DB57 · enforced compact KPI height and balanced content active' maxdock-config.js
          grep -q 'style.setProperty(property,value,"important")' maxdock-db57.js
          grep -q 'font-size:12px' maxdock-db57.css
          grep -q 'height:60px' maxdock-db57.css
          node --check maxdock-config.js
          node --check maxdock-db57.js
          cmp -s maxdock-config.js db04/maxdock-config.js
          cmp -s maxdock-db57.js db04/maxdock-db57.js
          cmp -s maxdock-db57.css db04/maxdock-db57.css
          cmp -s DEPLOYMENT_DB57.txt db04/DEPLOYMENT_DB57.txt

      - name: Commit finalized DB57 release
        shell: bash
        run: |
          rm -f .github/workflows/finalize-db57.yml
          git config user.name 'MaxSolutionsMiss'
          git config user.email 'javadresa@maxpkgsolutions.com'
          git add -A
          if git diff --cached --quiet; then exit 0; fi
          git commit -m '[db57-finalized] Enforce compact KPI dimensions and balance typography'
          git push origin HEAD:codex/db57-enforced-compact-kpi-balance
