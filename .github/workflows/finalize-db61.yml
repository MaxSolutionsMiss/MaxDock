name: Finalize DB61 KPI consistency and persistent location

on:
  push:
    branches: [codex/db61-kpi-controls-persistent-location]
    paths:
      - '.github/workflows/finalize-db61.yml'

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out DB61 branch
        uses: actions/checkout@v4
        with:
          ref: codex/db61-kpi-controls-persistent-location
          fetch-depth: 0

      - name: Validate DB61 release
        shell: bash
        run: |
          grep -q 'MaxDock-v82-DB61' maxdock-config.js
          grep -q 'maxdock-db61.css' maxdock-config.js
          grep -q 'maxdock-db61.js' maxdock-config.js
          grep -q 'dataset.maxdockRelease="db61"' maxdock-config.js
          grep -q 'DB61 · KPI consistency, compact controls, and persistent location context active' maxdock-config.js
          grep -q 'grid-auto-rows:92px' maxdock-db61.css
          grep -q 'height:92px' maxdock-db61.css
          grep -q 'width:44px' maxdock-db61.css
          grep -q 'font-size:22px' maxdock-db61.css
          grep -q 'font-size:13px' maxdock-db61.css
          grep -q 'font-size:17px' maxdock-db61.css
          grep -q 'queueFilters' maxdock-db61.css
          grep -q 'myAppointmentToolbar' maxdock-db61.css
          grep -q 'db61PersistentLocation' maxdock-db61.css
          grep -q 'dashboardShowMetrics' maxdock-db61.js
          grep -q 'myAppointmentsShowMetricsDB60' maxdock-db61.js
          grep -q 'db61-visible-kpis' maxdock-db61.js
          grep -q 'maxdock_location' maxdock-db61.js
          grep -q 'dashboardCustomizeMenu' maxdock-db61.js
          node --check maxdock-config.js
          node --check maxdock-db61.js
          cmp -s maxdock-config.js db04/maxdock-config.js
          cmp -s maxdock-db61.css db04/maxdock-db61.css
          cmp -s maxdock-db61.js db04/maxdock-db61.js
          cmp -s DEPLOYMENT_DB61.txt db04/DEPLOYMENT_DB61.txt

      - name: Commit finalized DB61 review branch
        shell: bash
        run: |
          rm -f .github/workflows/finalize-db61.yml
          git config user.name 'MaxSolutionsMiss'
          git config user.email 'javadresa@maxpkgsolutions.com'
          git add -A
          git commit -m '[db61-finalized] Align KPIs, compact controls, and persist location context'
          git push origin HEAD:codex/db61-kpi-controls-persistent-location
