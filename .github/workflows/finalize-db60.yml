name: Finalize DB60 KPI spacing and appointment preferences

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'codex/db60-kpi-spacing-appointment-preferences'
    runs-on: ubuntu-latest
    steps:
      - name: Check out DB60 branch
        uses: actions/checkout@v4
        with:
          ref: codex/db60-kpi-spacing-appointment-preferences
          fetch-depth: 0

      - name: Build mirrored DB60 release
        shell: bash
        run: |
          mkdir -p db04
          cp maxdock-config.js db04/maxdock-config.js
          cp maxdock-db60.css db04/maxdock-db60.css
          cp maxdock-db60.js db04/maxdock-db60.js
          cp DEPLOYMENT_DB60.txt db04/DEPLOYMENT_DB60.txt

      - name: Validate DB60 runtime
        shell: bash
        run: |
          grep -q 'MaxDock-v81-DB60' maxdock-config.js
          grep -q 'maxdock-db60.css' maxdock-config.js
          grep -q 'maxdock-db60.js' maxdock-config.js
          grep -q 'dataset.maxdockRelease="db60"' maxdock-config.js
          grep -q 'DB60 · KPI breathing room and appointment dashboard preferences active' maxdock-config.js
          ! grep -q 'await loadScript("maxdock-db59.js"' maxdock-config.js
          grep -q 'height:80px' maxdock-db60.css
          grep -q 'width:44px' maxdock-db60.css
          grep -q 'font-size:22px' maxdock-db60.css
          grep -q 'font-size:13px' maxdock-db60.css
          grep -q 'my-appointments-density' maxdock-db60.js
          grep -q 'Show KPI dashboard' maxdock-db60.js
          grep -q 'myAppointmentsCustomizeDB60' maxdock-db60.js
          node --check maxdock-config.js
          node --check maxdock-db60.js
          cmp -s maxdock-config.js db04/maxdock-config.js
          cmp -s maxdock-db60.css db04/maxdock-db60.css
          cmp -s maxdock-db60.js db04/maxdock-db60.js
          cmp -s DEPLOYMENT_DB60.txt db04/DEPLOYMENT_DB60.txt

      - name: Commit finalized DB60 release
        shell: bash
        run: |
          rm -f .github/workflows/finalize-db60.yml
          git config user.name 'MaxSolutionsMiss'
          git config user.email 'javadresa@maxpkgsolutions.com'
          git add -A
          if git diff --cached --quiet; then exit 0; fi
          git commit -m '[db60-finalized] Add KPI breathing room and appointment dashboard preferences'
          git push origin HEAD:codex/db60-kpi-spacing-appointment-preferences
