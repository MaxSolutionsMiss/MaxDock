name: DB71 regression repair

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/db71-regression-repair.yml
      - db04/maxdock-db71-regression.css
      - db04/maxdock-db71-regression.js

permissions:
  contents: write

jobs:
  repair-live-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Fetch repair files from main
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git show origin/main:db04/maxdock-db71-regression.css > /tmp/db71.css
          git show origin/main:db04/maxdock-db71-regression.js > /tmp/db71.js

      - name: Apply and validate repair
        shell: bash
        run: |
          set -euo pipefail
          if ! grep -q 'DB71 regression repair' db04/maxdock.css; then
            printf '\n\n' >> db04/maxdock.css
            cat /tmp/db71.css >> db04/maxdock.css
          fi
          if ! grep -q 'maxdock_db71_metrics_' db04/maxdock-db.js; then
            printf '\n\n' >> db04/maxdock-db.js
            cat /tmp/db71.js >> db04/maxdock-db.js
          fi
          node --check db04/maxdock-db.js

      - name: Commit live repair
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add db04/maxdock.css db04/maxdock-db.js
          if git diff --cached --quiet; then
            echo 'DB71 repair already present.'
            exit 0
          fi
          git commit -m 'DB71 fix page spacing, metric gears, and queue KPIs'
          git push origin gh-pages
