name: Finalize DB53 role-safe booking and appointment layout

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'codex/db53-role-safe-booking-and-appointment-layout' && !contains(github.event.pull_request.head.sha, '0000000')
    runs-on: ubuntu-latest
    steps:
      - name: Check out DB53 branch
        uses: actions/checkout@v4
        with:
          ref: codex/db53-role-safe-booking-and-appointment-layout
          fetch-depth: 0

      - name: Build mirrored DB53 release
        shell: bash
        run: |
          cp maxdock-db52.js db04/maxdock-db52.js
          cp maxdock-db53.js db04/maxdock-db53.js
          cp maxdock-db53.css db04/maxdock-db53.css
          cp DEPLOYMENT_DB53.txt db04/DEPLOYMENT_DB53.txt
          python - <<'PY'
          from pathlib import Path
          path=Path('maxdock-config.js')
          text=path.read_text()
          text=text.replace('MaxDock-v73-DB52','MaxDock-v74-DB53')
          text=text.replace('73-db52','74-db53')
          css='  loadCss("maxdock-db53.css","74-db53","db53");\n'
          if 'maxdock-db53.css' not in text:
              text=text.replace('  loadCss("maxdock-db52.css","74-db53","db52");\n', '  loadCss("maxdock-db52.css","74-db53","db52");\n'+css)
          js='    await loadScript("maxdock-db53.js","74-db53","db53");\n'
          if 'maxdock-db53.js' not in text:
              text=text.replace('    await loadScript("maxdock-db52.js","74-db53","db52");\n', '    await loadScript("maxdock-db52.js","74-db53","db52");\n'+js)
          text=text.replace('document.documentElement.dataset.maxdockRelease="db52"','document.documentElement.dataset.maxdockRelease="db53"')
          text=text.replace('DB52 · reliable booking actions and simplified five-step scheduling active','DB53 · role-safe navigation, booking readiness, and compact appointment workspace active')
          path.write_text(text)
          Path('db04/maxdock-config.js').write_text(text)
          PY

      - name: Validate DB53 runtime
        shell: bash
        run: |
          grep -q 'MaxDock-v74-DB53' maxdock-config.js
          grep -q 'maxdock-db53.css' maxdock-config.js
          grep -q 'maxdock-db53.js' maxdock-config.js
          grep -q 'DB53 · role-safe navigation, booking readiness, and compact appointment workspace active' maxdock-config.js
          grep -q 'maxdockContextReady' maxdock-db52.js
          grep -q 'OPERATIONAL_ROUTES' maxdock-db53.js
          grep -q 'appointmentsWorkspaceDB53' maxdock-db53.css
          node --check maxdock-config.js
          node --check maxdock-db52.js
          node --check maxdock-db53.js
          cmp -s maxdock-config.js db04/maxdock-config.js
          cmp -s maxdock-db52.js db04/maxdock-db52.js
          cmp -s maxdock-db53.js db04/maxdock-db53.js
          cmp -s maxdock-db53.css db04/maxdock-db53.css
          cmp -s DEPLOYMENT_DB53.txt db04/DEPLOYMENT_DB53.txt

      - name: Commit finalized DB53 release
        shell: bash
        run: |
          rm -f .github/workflows/finalize-db53.yml
          git config user.name 'MaxSolutionsMiss'
          git config user.email 'javadresa@maxpkgsolutions.com'
          git add -A
          if git diff --cached --quiet; then exit 0; fi
          git commit -m '[db53-finalized] Enforce role navigation and reliable booking readiness'
          git push origin HEAD:codex/db53-role-safe-booking-and-appointment-layout
