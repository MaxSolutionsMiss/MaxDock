<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1,viewport-fit=cover" name="viewport"/>
<meta content="no-cache, no-store, must-revalidate" http-equiv="Cache-Control"/>
<link href="./maxdock.css?v=89-db68" rel="stylesheet"/>
<link href="./maxdock-db04.css?v=89-db68" rel="stylesheet"/>
<title>MaxDock – Set Password</title>
</head>
<body class="loginPage" data-page="password" data-release="db68">
<main class="loginShell">
<section aria-labelledby="passwordTitle" class="loginCard">
<div class="loginBrand">
<div aria-hidden="true" class="logo loginLogo"><img alt="" class="logoMark" src="./max-solutions-mark.png"/></div>
<div><p class="loginProduct">MaxDock</p><p class="loginCompany">Max Solutions Packaging Inc.</p></div>
</div>
<h1 id="passwordTitle">Set your password</h1>
<p class="loginIntro" id="passwordIntro">Complete your MaxDock account setup.</p>
<form class="loginForm" hidden="" id="passwordForm">
<div class="field">
<label for="newPassword">New password</label>
<input autocomplete="new-password" id="newPassword" minlength="6" required="" type="password"/>
</div>
<div class="field">
<label for="confirmPassword">Confirm password</label>
<input autocomplete="new-password" id="confirmPassword" minlength="6" required="" type="password"/>
</div>
<div class="error loginError" id="passwordError" role="alert"></div>
<button class="primaryBtn loginButton" id="passwordButton" type="submit">Save Password</button>
</form>
<p class="loginHelp">Use at least 6 characters. MaxDock never displays or stores your private password.</p>
</section>
</main>
<script src="./supabase-2.110.3.js?v=89-db68"></script>
<script src="./maxdock-config.js?v=89-db68"></script>
<script src="./maxdock-db.js?v=89-db68"></script>
<script src="./maxdock-password.js?v=89-db68"></script>
</body>
</html>
