<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<link rel="stylesheet" href="./maxdock.css?v=46-db19">
<link rel="stylesheet" href="./maxdock-db04.css?v=46-db19">
<title>MaxDock – Set Password</title>
</head>
<body data-page="password" class="loginPage">
  <main class="loginShell">
    <section class="loginCard" aria-labelledby="passwordTitle">
      <div class="logo loginLogo" aria-hidden="true"><img class="logoMark" src="./max-solutions-mark.png" alt=""></div>
      <p class="loginEyebrow">Max Solutions</p>
      <h1 id="passwordTitle">Set your password</h1>
      <p class="loginIntro" id="passwordIntro">Complete your MaxDock account setup.</p>

      <form id="passwordForm" class="loginForm" hidden>
        <div class="field">
          <label for="newPassword">New password</label>
          <input id="newPassword" type="password" autocomplete="new-password" minlength="6" required>
        </div>
        <div class="field">
          <label for="confirmPassword">Confirm password</label>
          <input id="confirmPassword" type="password" autocomplete="new-password" minlength="6" required>
        </div>
        <div class="error loginError" id="passwordError" role="alert"></div>
        <button class="primaryBtn loginButton" id="passwordButton" type="submit">Save Password</button>
      </form>
      <p class="loginHelp">Use at least 6 characters. MaxDock never displays or stores your private password.</p>
    </section>
  </main>
<script src="./supabase-2.110.3.js?v=46-db19"></script>
<script src="./maxdock-config.js?v=46-db19"></script>
<script src="./maxdock-db.js?v=46-db19"></script>
<script src="./maxdock-password.js?v=46-db19"></script>
</body>
</html>
