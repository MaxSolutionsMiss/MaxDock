<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<link rel="stylesheet" href="./maxdock.css?v=46-db04">
<link rel="stylesheet" href="./maxdock-db04.css?v=46-db04">
<title>MaxDock – Internal Sign In</title>
</head>
<body data-page="login" class="loginPage">
  <main class="loginShell">
    <section class="loginCard" aria-labelledby="loginTitle">
      <div class="logo loginLogo" aria-hidden="true"><img class="logoMark" src="./max-solutions-mark.png" alt=""></div>
      <p class="loginEyebrow">Max Solutions</p>
      <h1 id="loginTitle">MaxDock</h1>
      <p class="loginIntro">Sign in with your internal MaxDock account.</p>

      <form id="loginForm" class="loginForm">
        <div class="field">
          <label for="loginEmail">Email</label>
          <input id="loginEmail" name="email" type="email" autocomplete="username" required autofocus>
        </div>
        <div class="field">
          <label for="loginPassword">Password</label>
          <input id="loginPassword" name="password" type="password" autocomplete="current-password" required>
        </div>
        <div class="error loginError" id="loginError" role="alert"></div>
        <button class="primaryBtn loginButton" id="loginButton" type="submit">Sign In</button>
      </form>
      <p class="loginHelp">Accounts are created by a MaxDock administrator. Public sign-up is disabled.</p>
    </section>
  </main>
<script src="./supabase-2.110.3.js?v=46-db04"></script>
<script src="./maxdock-config.js?v=46-db04"></script>
<script src="./maxdock-db.js?v=46-db04"></script>
<script src="./maxdock-auth.js?v=46-db04"></script>
</body>
</html>
