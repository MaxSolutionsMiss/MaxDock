<html lang="en">
<head>
<meta charset="utf-8">

<title>MaxDock – Operational Reports</title>
</head>
<body data-page="reports">
<header class="topbar">
  <div class="topbarInner">
    <div class="brandRow"><div class="brand">
      <a class="logoLink" href="./index.html?v=46-db11" aria-label="Go to MaxDock main page"><div class="logo"><img class="logoMark" src="./max-solutions-mark.png" alt="Max Solutions mark"></div></a>
      <div><h1 class="appTitle">MaxDock</h1></div>
    </div></div>
    <div class="headerActions">
      <div class="locationPill"><label for="reportLocation">Location</label><select id="reportLocation"></select></div>
      <a class="ghostBtn" href="./index.html?v=46-db11">Main Page</a>
      <details class="menuDetails">
        <summary class="iconBtn" title="Menu" aria-label="Open menu"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19.4 13.5c.1-.5.1-1 .1-1.5s0-1-.1-1.5l2-1.5-2-3.5-2.4 1a8 8 0 0 0-2.6-1.5L14 2.5h-4l-.4 2.5A8 8 0 0 0 7 6.5l-2.4-1-2 3.5 2 1.5c-.1.5-.1 1-.1 1.5s0 1 .1 1.5l-2 1.5 2 3.5 2.4-1a8 8 0 0 0 2.6-1.5l.4 2.5h4l.4-2.5a8 8 0 0 0 2.6-1.5l2.4 1 2-3.5-2-1.5ZM12 15.5A3.5 3.5 0 1 1 12 8a3.5 3.5 0 0 1 0 7.5Z"/></svg></summary>
        <nav class="menu">
          <a href="./my-appointments.html?v=46-db11">My Appointments</a>
          <a href="./dashboard.html?v=46-db11">Dashboard</a>
          <a href="./reports.html?v=46-db11" aria-current="page">Reports</a>
          <a href="./settings.html?v=46-db11">Settings</a>
          <a href="./admin.html?v=46-db11">Admin</a>
        </nav>
      </details>
    </div>
  </div>
</header>

<main class="screen pageWrap">
  <div class="pageHead">
    <div><h2>Operational Reports</h2><p>Booking volume, dock utilization, cancellations, and load mix.</p></div>
    <button class="secondaryBtn" id="exportReport" type="button">Export CSV</button>
  </div>

  <div class="dashboardFilters reportFilters">
    <div class="filterField"><label for="reportStart">Start Date</label><input id="reportStart" type="date"></div>
    <div class="filterField"><label for="reportEnd">End Date</label><input id="reportEnd" type="date"></div>
    <button class="primaryBtn" id="runReport" type="button">Update Report</button>
  </div>

  <div class="metrics reportMetrics" id="reportMetrics"></div>

  <div class="reportGrid">
    <section class="panel"><div class="panelHeader"><h3>Vehicle Mix</h3></div><div class="reportBars" id="truckReport"></div></section>
    <section class="panel"><div class="panelHeader"><h3>Appointment Mix</h3></div><div class="reportBars" id="typeReport"></div></section>
  </div>

  <section class="panel">
    <div class="panelHeader"><h3>Daily Summary</h3><small id="reportRangeLabel"></small></div>
    <div class="tableScroll"><table><thead><tr><th>Date</th><th>Appointments</th><th>Inbound Skids</th><th>Outbound Skids</th><th>Scheduled Hours</th><th>Cancelled</th></tr></thead><tbody id="dailyReport"></tbody></table></div>
  </section>
  <div class="error" id="reportError" role="alert"></div>
</main>

<script src="./supabase-2.110.3.js?v=46-db11"></script>
<script src="./maxdock-config.js?v=46-db11"></script>
<script src="./maxdock-db.js?v=46-db11"></script>
<script src="./maxdock-reports.js?v=46-db11"></script>
</body>
</html>
