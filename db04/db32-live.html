<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>MaxDock DB32 Live Verification</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#f7fafc}
iframe{display:block;width:100%;height:100%;border:0;background:#f7fafc}
</style>
</head>
<body>
<iframe id="maxdockFrame" title="MaxDock DB32" src="./dashboard.html?db32-live=20260717-4" allow="fullscreen"></iframe>
<script>
(function(){
  const css = `
.requestModalCompact{width:min(880px,100%)!important;max-height:calc(100vh - 12px)!important}
.requestModalCompact .modalBody{padding-top:10px!important}
.requestModalCompact .steps{gap:7px!important;margin-bottom:18px!important}
.requestModalCompact .stepPill{--step-accent:#2f7898;--step-bg:#eef7fb;--step-border:#c8dfea;grid-template-columns:auto auto!important;grid-template-rows:1fr!important;gap:7px!important;min-height:44px!important;padding:4px 8px!important;border:1px solid var(--step-border)!important;border-radius:11px!important;background:var(--step-bg)!important;color:#315a6c!important;font-size:13px!important;font-weight:700!important;line-height:1.12!important;box-shadow:0 2px 7px rgba(6,26,45,.05)!important;filter:none!important}
.requestModalCompact .stepPill:nth-child(2){--step-accent:#2f8379;--step-bg:#eef8f6;--step-border:#c8e3de;color:#315f59!important}
.requestModalCompact .stepPill:nth-child(3){--step-accent:#3f70a9;--step-bg:#eff5fb;--step-border:#cbdbea;color:#355772!important}
.requestModalCompact .stepPill:nth-child(4){--step-accent:#7967a7;--step-bg:#f4f1fa;--step-border:#ddd5ec;color:#5e527d!important}
.requestModalCompact .stepPill:nth-child(5){--step-accent:#9a6a2a;--step-bg:#faf6ed;--step-border:#eadcc0;color:#73562f!important}
.requestModalCompact .stepNum{min-width:20px!important;font-size:23px!important;font-weight:800!important;line-height:1!important}
.requestModalCompact .stepPill.active{border-color:var(--step-accent)!important;background:var(--step-bg)!important;color:var(--step-accent)!important;box-shadow:0 0 0 1px color-mix(in srgb,var(--step-accent) 24%,transparent),0 4px 10px rgba(6,26,45,.08)!important;filter:none!important}
.requestModalCompact .stepPill.completed{border-color:var(--step-border)!important;background:var(--step-bg)!important;color:var(--step-accent)!important;box-shadow:0 2px 7px rgba(6,26,45,.05)!important;filter:none!important}
.requestModalCompact .bookingRouteFields{grid-template-columns:.8fr 1.05fr 1.65fr!important;align-items:end!important}
.requestModalCompact .bookingRouteFields>.field:nth-child(5){grid-column:span 2!important}
.requestModalCompact .bookingSummaryRow{grid-template-columns:1.15fr 1fr!important;gap:10px!important}
.requestModalCompact .bookingRouteSummary,.requestModalCompact .bookingRequesterSummary{grid-template-columns:1fr!important;gap:4px!important;align-content:start!important;min-height:72px!important}
.requestModalCompact .bookingRouteSummary strong,.requestModalCompact .bookingRequesterSummary strong{grid-row:auto!important;justify-self:start!important;align-self:auto!important}
@media(max-width:760px){.requestModalCompact{width:100%!important;max-height:100vh!important}}
@media(max-width:620px){.requestModalCompact .steps{margin-bottom:14px!important}.requestModalCompact .stepPill{grid-template-columns:1fr!important;gap:1px!important;min-height:54px!important;padding:4px 3px!important;font-size:11px!important}.requestModalCompact .stepNum{font-size:22px!important}.requestModalCompact .bookingRouteFields{grid-template-columns:1fr 1fr!important}.requestModalCompact .bookingRouteFields>.field:nth-child(5){grid-column:auto!important}.requestModalCompact .bookingSummaryRow{grid-template-columns:1fr!important}.requestModalCompact .bookingRouteSummary,.requestModalCompact .bookingRequesterSummary{grid-template-columns:1fr!important;min-height:0!important}.requestModalCompact .bookingRouteSummary strong,.requestModalCompact .bookingRequesterSummary strong{grid-row:auto!important}}
`;
  const frame=document.getElementById('maxdockFrame');
  function inject(){
    try{
      const doc=frame.contentDocument;
      if(!doc||!doc.head)return;
      let style=doc.getElementById('db32LiveOverride');
      if(!style){style=doc.createElement('style');style.id='db32LiveOverride';doc.head.appendChild(style)}
      style.textContent=css;
    }catch(error){console.error('DB32 style injection failed',error)}
  }
  frame.addEventListener('load',function(){inject();setTimeout(inject,250);setTimeout(inject,1000)});
})();
</script>
</body>
</html>
