<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<link rel="stylesheet" href="./maxdock.css?v=46-db17">
<link rel="stylesheet" href="./maxdock-db04.css?v=46-db17">
<title>MaxDock – Operations Queue</title>
</head>
<body data-page="queue">
<header class="topbar">
  <div class="topbarInner">
    <div class="brandRow"><div class="brand">
      <a class="logoLink" href="./index.html?v=46-db17" aria-label="Go to MaxDock main page"><div class="logo"><img class="logoMark" src="./max-solutions-mark.png" alt="Max Solutions mark"></div></a>
      <div><h1 class="appTitle">MaxDock</h1></div>
    </div></div>
    <div class="headerActions">
      <div class="locationPill" id="queueLocationPill"><label for="queueLocation">Location</label><select id="queueLocation"></select></div>
      <a class="ghostBtn" href="./index.html?v=46-db17">Main Page</a>
      <details class="menuDetails">
        <summary class="iconBtn" title="Menu" aria-label="Open menu"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19.4 13.5c.1-.5.1-1 .1-1.5s0-1-.1-1.5l2-1.5-2-3.5-2.4 1a8 8 0 0 0-2.6-1.5L14 2.5h-4l-.4 2.5A8 8 0 0 0 7 6.5l-2.4-1-2 3.5 2 1.5c-.1.5-.1 1-.1 1.5s0 1 .1 1.5l-2 1.5 2 3.5 2.4-1a8 8 0 0 0 2.6 1.5l.4 2.5h4l.4-2.5a8 8 0 0 0 2.6-1.5l2.4 1 2-3.5-2-1.5ZM12 15.5A3.5 3.5 0 1 1 12 8a3.5 3.5 0 0 1 0 7.5Z"/></svg></summary>
        <nav class="menu">
          <a href="./my-appointments.html?v=46-db17">My Appointments</a>
          <a href="./queue.html?v=46-db17" aria-current="page">Operations Queue</a>
          <a href="./dashboard.html?v=46-db17">Dashboard</a>
          <a href="./reports.html?v=46-db17">Reports</a>
          <a href="./settings.html?v=46-db17">Settings</a>
          <a href="./admin.html?v=46-db17">Admin</a>
        </nav>
      </details>
    </div>
  </div>
</header>

<main class="screen pageWrap">
  <div class="pageHead queuePageHead">
    <div><h2>Operations Queue</h2><p>Today’s inbound, outbound, and dock-readiness execution list.</p></div>
    <div class="toolbar utilityToolbar pageUtilityActions" role="group" aria-label="Document actions"><button class="secondaryBtn utilityBtn" id="exportQueue" type="button">Export CSV</button><button class="secondaryBtn utilityBtn" id="printQueue" type="button">Print</button></div>
  </div>

  <div class="dashboardFilters queueFilters">
    <div class="filterField"><label for="queueDate">Operating Date</label><input id="queueDate" type="date"></div>
    <div class="filterField"><label for="queueStatus">Queue View</label><select id="queueStatus"><option value="pending">Pending</option><option value="all">All</option><option value="completed">Completed</option></select></div>
    <div class="queueFilterActions" role="group" aria-label="Queue date and refresh actions">
      <button class="secondaryBtn filterActionBtn" id="queueToday" type="button">Today</button>
      <button class="secondaryBtn filterActionBtn" id="queueTomorrow" type="button">Tomorrow</button>
      <button class="primaryBtn filterActionBtn" id="refreshQueue" type="button">Refresh queue</button>
    </div>
  </div>

  <section class="morningBrief" id="morningBrief" aria-labelledby="morningBriefTitle">
    <div class="morningBriefLead"><small id="morningBriefEyebrow">Shift brief</small><h3 id="morningBriefTitle">Preparing today’s operating picture…</h3><p id="morningBriefSummary"></p></div>
    <div class="morningBriefFacts" id="morningBriefFacts"></div>
  </section>

  <div class="metrics" id="queueMetrics"></div>

  <section class="queueFocus" id="queueFocus"></section>
  <div class="queueNotice" id="queueNotice" role="status" aria-live="polite" hidden></div>

  <section class="panel queueActionPanel">
    <div class="panelHeader"><div><h3>Shift Action List</h3><small id="queueActionSummary"></small></div></div>
    <div class="queueActionList" id="queueActions"></div>
  </section>

  <div class="queueLanes">
    <section class="panel queueLane inboundLane">
      <div class="panelHeader"><div><h3>Inbound</h3><small id="inboundSummary"></small></div></div>
      <div class="queueCards" id="inboundQueue"></div>
    </section>
    <section class="panel queueLane outboundLane">
      <div class="panelHeader"><div><h3>Outbound</h3><small id="outboundSummary"></small></div></div>
      <div class="queueCards" id="outboundQueue"></div>
    </section>
  </div>

  <section class="panel queueBlocksPanel" id="queueBlocksPanel" hidden>
    <div class="panelHeader"><h3>Dock Restrictions</h3></div>
    <div class="queueCards" id="queueBlocks"></div>
  </section>
  <div class="error" id="queueError" role="alert"></div>
</main>

<script src="./supabase-2.110.3.js?v=46-db17"></script>
<script src="./maxdock-config.js?v=46-db17"></script>
<script src="./maxdock-db.js?v=46-db17"></script>
<script src="./maxdock-queue.js?v=46-db17"></script>
</body>
</html>
